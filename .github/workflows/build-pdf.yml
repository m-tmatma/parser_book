name: Build PDF

on:
  push:
    branches: ["*"]
    paths:
      - 'tex/**'
      - 'build_pdf.sh'
      - 'docker/luatex/Dockerfile'
  pull_request:
    paths:
      - 'tex/**'
      - 'build_pdf.sh'
      - 'docker/luatex/Dockerfile'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-pdf:
    name: Build PDF with LuaLaTeX
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-luatex-${{ hashFiles('docker/luatex/Dockerfile') }}
          restore-keys: |
            ${{ runner.os }}-buildx-luatex-

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/luatex/Dockerfile
          load: true
          tags: parser-book-luatex:latest
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Build PDF
        run: |
          mkdir -p build
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -e HOME=/tmp \
            -v "${{ github.workspace }}:/work" \
            -w /work \
            parser-book-luatex:latest \
            ./build_pdf.sh build

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: parser-book-pdf
          path: build/parser_book.pdf
          if-no-files-found: error
