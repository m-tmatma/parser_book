name: Test sample code

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gradle:
    name: Gradle (${{ matrix.project }} / Java ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project:
          - chapter3
          - chapter5
          - chapter6:antlr
          - chapter6:javacc
          - chapter6:jcomb
        # 本書はJava 21を基準としつつJava 25での動作も保証したいので、両方で回す
        java: ['21', '25']
    defaults:
      run:
        working-directory: code
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: gradle
      - name: Run tests
        run: ./gradlew :${{ matrix.project }}:test --no-daemon

  yacc:
    name: yacc/flex (chapter6/yacc)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: code
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
      - name: Install bison, flex and byacc
        # Makefileがyacc/flex/Cコンパイラに依存している。ubuntuのbisonには
        # yaccコマンドが含まれないので、別途byacc（BSD yacc）を入れる
        run: |
          sudo apt-get update
          sudo apt-get install -y bison flex byacc
      - name: Run smoke test
        run: ./gradlew :chapter6:yacc:check --no-daemon
